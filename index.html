<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0A0F">
<link rel="manifest" href="manifest.json">
<title>SpendSmart</title>
<style>
:root{--bg:#0A0A0F;--surface:#13131E;--surface2:#1A1A2E;--border:#2A2A45;--text:#E8E8FF;--muted:#6B6B99;--accent:#7C3AED;--green:#00FF94;--blue:#00C8FF;--red:#FF6B6B;--yellow:#FBBF24;--pink:#F472B6;}
.light{--bg:#F0F4FF;--surface:#FFFFFF;--surface2:#F8FAFF;--border:#E2E8F0;--text:#1A1A3E;--muted:#64748B;--accent:#7C3AED;--green:#059669;--blue:#0284C7;--red:#DC2626;--yellow:#D97706;--pink:#DB2777;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden;transition:background .3s,color .3s;}
#splash{position:fixed;inset:0;background:#0A0A0F;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s ease,transform .6s ease;}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none;}
.splash-logo{font-size:64px;animation:sBounce .8s ease forwards;opacity:0;}
.splash-title{font-size:32px;font-weight:900;background:linear-gradient(135deg,#7C3AED,#00C8FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:12px;animation:sFade .6s .4s ease forwards;opacity:0;}
.splash-sub{font-size:13px;color:#6B6B99;margin-top:6px;animation:sFade .6s .6s ease forwards;opacity:0;}
.splash-made{position:absolute;bottom:48px;font-size:13px;color:#6B6B99;animation:sFade .6s 1s ease forwards;opacity:0;}
.splash-made span{color:#7C3AED;font-weight:700;}
.splash-bar{width:120px;height:3px;background:#1A1A2E;border-radius:99px;margin-top:32px;overflow:hidden;animation:sFade .6s .8s ease forwards;opacity:0;}
.splash-bar-fill{height:100%;width:0;background:linear-gradient(90deg,#7C3AED,#00C8FF);border-radius:99px;animation:sLoad 2s .8s ease forwards;}
@keyframes sBounce{0%{opacity:0;transform:scale(.5) translateY(20px)}60%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes sFade{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
@keyframes sLoad{0%{width:0}100%{width:100%}}
#setup{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:999;animation:fadeIn .5s ease;}
#setup.hidden{display:none;}
.setup-emoji{font-size:56px;margin-bottom:16px;}
.setup-title{font-size:26px;font-weight:900;text-align:center;margin-bottom:8px;}
.setup-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px;line-height:1.6;}
.setup-input{width:100%;background:var(--surface);border:2px solid var(--accent);border-radius:16px;padding:16px 18px;color:var(--text);font-size:18px;font-weight:700;outline:none;text-align:center;margin-bottom:20px;}
.setup-input::placeholder{color:var(--muted);font-weight:400;}
.setup-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#5B21B6);border:none;border-radius:16px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;}
#app{opacity:0;transition:opacity .5s ease;}
.header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);}
.logo{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.theme-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 2px 20px;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:5px 1px;border-radius:10px;margin:0 1px;border:none;background:transparent;color:var(--muted);transition:all .2s;position:relative;}
.nav-item.active{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent);}
.nav-icon{font-size:17px;}
.nav-label{font-size:7px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.nav-badge{position:absolute;top:2px;right:8px;background:#FF4444;color:#fff;border-radius:99px;font-size:9px;font-weight:800;padding:1px 5px;min-width:16px;text-align:center;}
.view{padding:16px 16px 100px;animation:fadeIn .3s ease;}
.view.hidden{display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.card.glow{border-color:var(--accent);box-shadow:0 0 24px color-mix(in srgb,var(--accent) 25%,transparent);}
.greeting-card{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 20%,var(--surface)),color-mix(in srgb,var(--blue) 10%,var(--surface)));border:1px solid var(--accent);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;}
.greeting-card::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:color-mix(in srgb,var(--accent) 15%,transparent);border-radius:50%;}
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.month-btn{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:6px 14px;color:var(--text);font-size:16px;font-weight:700;cursor:pointer;}
.month-btn:active{transform:scale(.92);}
.month-label{flex:1;text-align:center;font-weight:700;font-size:15px;}
.hero-amount{font-size:38px;font-weight:900;color:var(--green);text-align:center;margin:8px 0;letter-spacing:-1px;}
.hero-pills{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
.pill{border-radius:99px;padding:4px 12px;font-size:11px;font-weight:600;}
.pill-green{background:color-mix(in srgb,var(--green) 15%,transparent);border:1px solid color-mix(in srgb,var(--green) 30%,transparent);color:var(--green);}
.pill-blue{background:color-mix(in srgb,var(--blue) 15%,transparent);border:1px solid color-mix(in srgb,var(--blue) 30%,transparent);color:var(--blue);}
.stats-row{display:flex;gap:10px;margin-bottom:12px;}
.stat-card{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;}
.stat-value{font-size:15px;font-weight:800;}
.stat-label{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cat-bar-wrap{flex:1;}
.cat-bar-header{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;font-weight:600;}
.cat-bar-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.exp-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.exp-item:last-child{border-bottom:none;}
.exp-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.exp-info{flex:1;min-width:0;}
.exp-note{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exp-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.exp-amount{font-weight:800;font-size:14px;color:var(--red);flex-shrink:0;}
input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;color:var(--text);font-size:15px;outline:none;font-family:inherit;appearance:none;-webkit-appearance:none;transition:border-color .2s;}
input:focus,select:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}
.input-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.input-group{margin-bottom:14px;}
.cat-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.cat-chip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.primary-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),#5B21B6);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 0 20px color-mix(in srgb,var(--accent) 35%,transparent);}
.primary-btn:active{transform:scale(.97);}
.secondary-btn{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.preview-box{border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;background:color-mix(in srgb,var(--accent) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);}
.preview-amount{font-weight:900;font-size:20px;color:var(--green);}
.view-all-btn{width:100%;margin-top:10px;background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:10px;padding:10px;color:var(--accent);font-weight:700;font-size:13px;cursor:pointer;}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0 12px;margin-bottom:12px;}
.search-bar:focus-within{border-color:var(--accent);}
.search-bar input{border:none;background:transparent;padding:12px 0;font-size:14px;}
.del-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:4px 8px;}
.del-confirm{display:flex;gap:4px;}
.del-yes{background:#FF4444;border:none;border-radius:6px;color:#fff;padding:4px 8px;font-size:11px;font-weight:700;cursor:pointer;}
.del-no{background:var(--border);border:none;border-radius:6px;color:var(--text);padding:4px 8px;font-size:11px;cursor:pointer;}
.bar-chart{display:flex;align-items:flex-end;height:100px;gap:4px;padding:0 2px;margin-bottom:8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .6s cubic-bezier(.4,0,.2,1);}
.bar-month{font-size:7px;font-weight:600;}
.budget-row{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.budget-info{flex:1;}
.budget-header{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px;font-weight:600;}
.budget-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:3px;}
.budget-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.budget-sub{font-size:11px;color:var(--muted);}
.edit-btn{background:color-mix(in srgb,var(--accent) 15%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:8px;padding:6px 10px;color:var(--accent);font-size:12px;font-weight:700;cursor:pointer;}
.profile-hero{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 25%,var(--surface)),color-mix(in srgb,var(--blue) 15%,var(--surface)));border:1px solid var(--accent);border-radius:20px;padding:24px;text-align:center;margin-bottom:12px;position:relative;overflow:hidden;}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 12px;box-shadow:0 0 24px color-mix(in srgb,var(--accent) 40%,transparent);}
.profile-name{font-size:22px;font-weight:900;}
.profile-greeting{font-size:13px;color:var(--muted);margin-top:4px;}
.profile-edit-btn{margin-top:14px;background:color-mix(in srgb,var(--accent) 15%,transparent);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);border-radius:10px;padding:8px 20px;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-grid-item{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.stat-grid-value{font-size:18px;font-weight:900;color:var(--accent);}
.stat-grid-label{font-size:11px;color:var(--muted);margin-top:4px;}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;}
.toggle-switch{width:48px;height:26px;background:var(--border);border-radius:99px;position:relative;transition:background .3s;}
.toggle-switch.on{background:var(--accent);}
.toggle-knob{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .3s;box-shadow:0 2px 4px rgba(0,0,0,.3);}
.toggle-switch.on .toggle-knob{transform:translateX(22px);}
.made-by{text-align:center;padding:20px;color:var(--muted);font-size:12px;line-height:1.8;}
.made-by span{color:var(--accent);font-weight:700;}
.edu-hero{background:linear-gradient(135deg,color-mix(in srgb,#10B981 20%,var(--surface)),color-mix(in srgb,#3B82F6 10%,var(--surface)));border:1px solid #10B981;border-radius:20px;padding:18px;margin-bottom:12px;}
.edu-tuition-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;transition:all .2s;}
.edu-tuition-card.paid{border-color:#10B981;background:color-mix(in srgb,#10B981 8%,var(--surface2));}
.edu-tuition-card.unpaid{border-color:#FF6B6B;background:color-mix(in srgb,#FF6B6B 6%,var(--surface2));}
.edu-top{display:flex;align-items:center;gap:12px;}
.edu-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#10B981,#3B82F6);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.edu-info{flex:1;}
.edu-name{font-weight:700;font-size:15px;}
.edu-fee{font-size:12px;color:var(--muted);margin-top:2px;}
.edu-status-btn{padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
.edu-status-btn.paid{background:#10B981;color:#fff;}
.edu-status-btn.unpaid{background:#FF6B6B22;border:1px solid #FF6B6B;color:#FF6B6B;}
.edu-due{font-size:11px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.edu-add-btn{width:100%;padding:14px;background:linear-gradient(135deg,#10B981,#3B82F6);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;}
.edu-del-btn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:4px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;animation:fadeIn .2s ease;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:24px;width:100%;max-width:360px;box-shadow:0 0 40px color-mix(in srgb,var(--accent) 25%,transparent);}
.modal h3{font-size:16px;margin-bottom:16px;}
.modal-btns{display:flex;gap:10px;margin-top:14px;}
.modal-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px;color:var(--text);font-weight:600;cursor:pointer;font-size:15px;}
.modal-save{flex:1;background:var(--accent);border:none;border-radius:12px;padding:13px;color:#fff;font-weight:700;cursor:pointer;font-size:15px;}
.edu-modal{border-color:#10B981;}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:99px;font-weight:700;font-size:13px;z-index:9998;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:opacity .3s,transform .3s;pointer-events:none;}
.toast.success{background:var(--green);color:#000;}
.toast.error{background:#FF4444;color:#fff;}
.toast.hidden{opacity:0;transform:translateX(-50%) translateY(-8px);}
.hidden{display:none!important;}
.over-text{font-size:10px;color:var(--red);margin-top:3px;}
.empty-text{text-align:center;color:var(--muted);padding:24px 0;font-size:13px;}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">💰</div>
  <div class="splash-title">SpendSmart</div>
  <div class="splash-sub">Your Personal Finance Tracker</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  <div class="splash-made">Made with ❤️ by <span>Subhadip</span></div>
</div>

<div id="setup" class="hidden">
  <div class="setup-emoji">👋</div>
  <div class="setup-title">Welcome to SpendSmart!</div>
  <div class="setup-sub">Let's personalize your experience.<br>What should we call you?</div>
  <input class="setup-input" id="setup-name" type="text" placeholder="Enter your name..." maxlength="20" onkeydown="if(event.key==='Enter')saveSetup()">
  <button class="setup-btn" onclick="saveSetup()">Let's Go! 🚀</button>
</div>

<div class="toast hidden" id="toast"></div>

<div id="app">
  <div class="header">
    <div>
      <div class="logo">💰 SpendSmart</div>
      <div class="logo-sub">Personal Finance Tracker</div>
    </div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️ Light</button>
  </div>

  <div id="view-dashboard" class="view"></div>
  <div id="view-add"       class="view hidden"></div>
  <div id="view-history"   class="view hidden"></div>
  <div id="view-analytics" class="view hidden"></div>
  <div id="view-edupay"    class="view hidden"></div>
  <div id="view-profile"   class="view hidden"></div>

  <nav class="nav">
    <button class="nav-item active" onclick="switchTab('dashboard',this)">
      <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="switchTab('add',this)">
      <span class="nav-icon">➕</span><span class="nav-label">Add</span>
    </button>
    <button class="nav-item" onclick="switchTab('history',this)">
      <span class="nav-icon">📋</span><span class="nav-label">History</span>
    </button>
    <button class="nav-item" onclick="switchTab('analytics',this)">
      <span class="nav-icon">📊</span><span class="nav-label">Charts</span>
    </button>
    <button class="nav-item" id="nav-edupay" onclick="switchTab('edupay',this)">
      <span class="nav-icon">🎓</span><span class="nav-label">EduPay</span>
    </button>
    <button class="nav-item" onclick="switchTab('profile',this)">
      <span class="nav-icon">👤</span><span class="nav-label">Profile</span>
    </button>
  </nav>
</div>

<!-- Budget Modal -->
<div class="modal-overlay hidden" id="budget-modal">
  <div class="modal">
    <h3 id="modal-title">Set Budget</h3>
    <input type="number" id="modal-input" placeholder="Enter amount" inputmode="numeric">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveBudget()">Save</button>
    </div>
  </div>
</div>

<!-- EduPay Modal -->
<div class="modal-overlay hidden" id="edu-modal">
  <div class="modal edu-modal">
    <h3>➕ Add Fee Entry</h3>
    <div class="input-group">
      <div class="input-label">Student / Subject Name</div>
      <input type="text" id="edu-name-input" placeholder="e.g. Rahul - Math Tuition">
    </div>
    <div class="input-group">
      <div class="input-label">Monthly Fee (₹)</div>
      <input type="number" id="edu-fee-input" placeholder="e.g. 1500" inputmode="numeric">
    </div>
    <div class="input-group">
      <div class="input-label">Due Date</div>
      <input type="date" id="edu-due-input">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeEduModal()">Cancel</button>
      <button class="modal-save" style="background:#10B981;" onclick="saveEduEntry()">Add</button>
    </div>
  </div>
</div>

<script>
// ── Data ──────────────────────────────────────────────
const CATS = [
  {id:'food',    label:'🍔 Food',      color:'#FF6B6B'},
  {id:'travel',  label:'🚗 Travel',    color:'#FBBF24'},
  {id:'shop',    label:'🛍️ Shopping',  color:'#F472B6'},
  {id:'bills',   label:'💡 Bills',     color:'#00C8FF'},
  {id:'health',  label:'💊 Health',    color:'#00FF94'},
  {id:'edu',     label:'📚 Education', color:'#7C3AED'},
  {id:'entertain',label:'🎮 Fun',      color:'#A78BFA'},
  {id:'other',   label:'📦 Other',     color:'#6B6B99'},
];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

let expenses  = load('ss_exp',[]);
let budgets   = load('ss_bud',{});
let userName  = load('ss_name','');
let darkMode  = load('ss_dark',true);
let eduEntries= load('ss_edu',[]);
let viewMonth = new Date().getMonth();
let viewYear  = new Date().getFullYear();
let selectedCat = 'food';
let editBudgetCat = '';

// ── Init ──────────────────────────────────────────────
window.addEventListener('load', () => {
  if (darkMode) document.body.classList.remove('light');
  else document.body.classList.add('light');
  updateThemeBtn();

  // Splash → setup or app after 2.8s
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      if (!userName) {
        document.getElementById('setup').classList.remove('hidden');
      } else {
        showApp();
      }
    }, 600);
  }, 2800);

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
});

function showApp() {
  document.getElementById('setup').classList.add('hidden');
  const app = document.getElementById('app');
  app.style.display = 'block';
  setTimeout(() => { app.style.opacity = '1'; }, 50);
  renderDashboard();
  updateEduBadge();
}

function saveSetup() {
  const n = document.getElementById('setup-name').value.trim();
  if (!n) { showToast('Please enter your name!','error'); return; }
  userName = n;
  save('ss_name', userName);
  showApp();
}

// ── Theme ─────────────────────────────────────────────
function toggleTheme() {
  darkMode = !darkMode;
  save('ss_dark', darkMode);
  if (darkMode) document.body.classList.remove('light');
  else document.body.classList.add('light');
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('theme-btn').textContent = darkMode ? '☀️ Light' : '🌙 Dark';
}

// ── Toast ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.add('hidden'); }, 2200);
}

// ── Tab Switch ────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.remove('hidden');
  btn.classList.add('active');
  if (name==='dashboard') renderDashboard();
  if (name==='add')       renderAdd();
  if (name==='history')   renderHistory();
  if (name==='analytics') renderAnalytics();
  if (name==='edupay')    renderEduPay();
  if (name==='profile')   renderProfile();
}

// ── Helpers ───────────────────────────────────────────
function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN'); }
function catById(id) { return CATS.find(c=>c.id===id) || CATS[7]; }
function monthExpenses(m, y) {
  return expenses.filter(e => {
    const d = new Date(e.date);
    return d.getMonth()===m && d.getFullYear()===y;
  });
}
function totalOf(arr) { return arr.reduce((s,e)=>s+e.amount,0); }

// ── Dashboard ─────────────────────────────────────────
function renderDashboard() {
  const exps = monthExpenses(viewMonth, viewYear);
  const total = totalOf(exps);
  const budgetTotal = Object.values(budgets).reduce((s,v)=>s+(v||0),0);
  const remaining = budgetTotal - total;
  const monthLabel = MONTHS[viewMonth] + ' ' + viewYear;

  // Category breakdown
  const catTotals = {};
  exps.forEach(e => { catTotals[e.cat] = (catTotals[e.cat]||0) + e.amount; });
  const topCats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,4);

  // Recent 3
  const recent = [...exps].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);

  document.getElementById('view-dashboard').innerHTML = `
    <div class="greeting-card">
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px;">👋 Hey, ${userName}!</div>
      <div style="font-size:18px;font-weight:800;">Here's your summary</div>
      <div class="hero-pills" style="margin-top:10px;">
        <span class="pill pill-green">💰 ${fmt(total)} spent</span>
        ${budgetTotal>0?`<span class="pill ${remaining>=0?'pill-blue':''}${remaining<0?'pill':''}" style="${remaining<0?'background:color-mix(in srgb,var(--red) 15%,transparent);border:1px solid color-mix(in srgb,var(--red) 30%,transparent);color:var(--red)':''}">
          ${remaining>=0?'✅':'⚠️'} ${fmt(Math.abs(remaining))} ${remaining>=0?'left':'over'}
        </span>`:''}
      </div>
    </div>

    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label">${monthLabel}</div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">${fmt(total)}</div>
        <div class="stat-label">Total Spent</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${exps.length}</div>
        <div class="stat-label">Transactions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${exps.length?fmt(Math.round(total/exps.length)):'₹0'}</div>
        <div class="stat-label">Avg/Txn</div>
      </div>
    </div>

    ${topCats.length ? `
    <div class="card">
      <div class="sec-title">Top Categories</div>
      ${topCats.map(([id,amt])=>{
        const cat = catById(id);
        const pct = total>0?Math.round(amt/total*100):0;
        return `<div class="cat-row">
          <span style="font-size:20px;">${cat.label.split(' ')[0]}</span>
          <div class="cat-bar-wrap">
            <div class="cat-bar-header">
              <span>${cat.label.split(' ').slice(1).join(' ')}</span>
              <span>${fmt(amt)}</span>
            </div>
            <div class="cat-bar-track">
              <div class="cat-bar-fill" style="width:${pct}%;background:${cat.color};"></div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    ${recent.length ? `
    <div class="card">
      <div class="sec-title">Recent Expenses</div>
      ${recent.map(e=>{
        const cat = catById(e.cat);
        return `<div class="exp-item">
          <div class="exp-icon" style="background:${cat.color}22;">${cat.label.split(' ')[0]}</div>
          <div class="exp-info">
            <div class="exp-note">${e.note||cat.label}</div>
            <div class="exp-meta">${cat.label.split(' ').slice(1).join(' ')} · ${new Date(e.date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
          </div>
          <div class="exp-amount">${fmt(e.amount)}</div>
        </div>`;
      }).join('')}
      <button class="view-all-btn" onclick="document.querySelectorAll('.nav-item')[2].click()">View All →</button>
    </div>` : `<div class="empty-text">No expenses this month.<br>Tap ➕ to add one!</div>`}
  `;
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderDashboard();
}

// ── Add Expense ───────────────────────────────────────
function renderAdd() {
  document.getElementById('view-add').innerHTML = `
    <div class="card glow">
      <div style="font-size:15px;font-weight:800;margin-bottom:16px;">➕ New Expense</div>
      <div class="input-group">
        <div class="input-label">Amount (₹)</div>
        <input type="number" id="add-amount" placeholder="0.00" inputmode="decimal" oninput="updatePreview()">
      </div>
      <div class="input-group">
        <div class="input-label">Category</div>
        <div class="cat-chips" id="cat-chips">
          ${CATS.map(c=>`<div class="cat-chip${c.id===selectedCat?' active':''}" 
            style="${c.id===selectedCat?`background:${c.color}22;border-color:${c.color};color:${c.color}`:''}"
            onclick="selectCat('${c.id}',this,'${c.color}')">${c.label}</div>`).join('')}
        </div>
      </div>
      <div class="input-group">
        <div class="input-label">Note (optional)</div>
        <input type="text" id="add-note" placeholder="What did you spend on?" maxlength="40">
      </div>
      <div class="input-group">
        <div class="input-label">Date</div>
        <input type="date" id="add-date" value="${new Date().toISOString().split('T')[0]}">
      </div>
      <div class="preview-box" id="preview-box" style="display:none;">
        <span style="font-size:13px;color:var(--muted);">You're adding</span>
        <span class="preview-amount" id="preview-amt">₹0</span>
      </div>
      <button class="primary-btn" onclick="addExpense()">Add Expense 💸</button>
    </div>
  `;
}

function selectCat(id, el, color) {
  selectedCat = id;
  document.querySelectorAll('.cat-chip').forEach(c => {
    c.classList.remove('active');
    c.removeAttribute('style');
  });
  el.classList.add('active');
  el.style.cssText = `background:${color}22;border-color:${color};color:${color}`;
}

function updatePreview() {
  const v = parseFloat(document.getElementById('add-amount').value);
  const box = document.getElementById('preview-box');
  const amt = document.getElementById('preview-amt');
  if (v > 0) { box.style.display='flex'; amt.textContent = fmt(v); }
  else box.style.display='none';
}

function addExpense() {
  const amount = parseFloat(document.getElementById('add-amount').value);
  const note   = document.getElementById('add-note').value.trim();
  const date   = document.getElementById('add-date').value;
  if (!amount || amount <= 0) { showToast('Enter a valid amount!','error'); return; }
  if (!date) { showToast('Pick a date!','error'); return; }
  expenses.push({ id: Date.now(), amount, cat: selectedCat, note, date });
  save('ss_exp', expenses);
  showToast('Expense added! 💸');
  renderAdd();
}

// ── History ───────────────────────────────────────────
let historySearch = '';
let deleteConfirm = null;

function renderHistory() {
  const filtered = expenses
    .filter(e => !historySearch || e.note?.toLowerCase().includes(historySearch) ||
      catById(e.cat).label.toLowerCase().includes(historySearch))
    .sort((a,b)=>new Date(b.date)-new Date(a.date));

  document.getElementById('view-history').innerHTML = `
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" placeholder="Search expenses..." value="${historySearch}" 
        oninput="historySearch=this.value.toLowerCase();renderHistory()">
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;">${filtered.length} transactions · ${fmt(totalOf(filtered))} total</div>
    <div class="card">
      ${filtered.length ? filtered.map(e=>{
        const cat = catById(e.cat);
        return `<div class="exp-item" id="exp-${e.id}">
          <div class="exp-icon" style="background:${cat.color}22;">${cat.label.split(' ')[0]}</div>
          <div class="exp-info">
            <div class="exp-note">${e.note||cat.label}</div>
            <div class="exp-meta">${cat.label.split(' ').slice(1).join(' ')} · ${new Date(e.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="exp-amount">${fmt(e.amount)}</div>
            ${deleteConfirm===e.id
              ? `<div class="del-confirm">
                  <button class="del-yes" onclick="confirmDelete(${e.id})">✓</button>
                  <button class="del-no" onclick="deleteConfirm=null;renderHistory()">✗</button>
                </div>`
              : `<button class="del-btn" onclick="deleteConfirm=${e.id};renderHistory()">🗑️</button>`
            }
          </div>
        </div>`;
      }).join('') : `<div class="empty-text">No expenses found.</div>`}
    </div>
  `;
}

function confirmDelete(id) {
  expenses = expenses.filter(e=>e.id!==id);
  save('ss_exp', expenses);
  deleteConfirm = null;
  showToast('Deleted!','error');
  renderHistory();
}

// ── Analytics ─────────────────────────────────────────
function renderAnalytics() {
  const now = new Date();
  // Last 6 months bar data
  const barData = [];
  for (let i=5; i>=0; i--) {
    let m = now.getMonth()-i; let y = now.getFullYear();
    if (m<0){m+=12;y--;}
    barData.push({label:MONTHS[m].slice(0,3), total:totalOf(monthExpenses(m,y))});
  }
  const maxBar = Math.max(...barData.map(b=>b.total),1);

  // This month breakdown
  const exps = monthExpenses(now.getMonth(), now.getFullYear());
  const total = totalOf(exps);
  const catTotals = {};
  exps.forEach(e=>{ catTotals[e.cat]=(catTotals[e.cat]||0)+e.amount; });

  document.getElementById('view-analytics').innerHTML = `
    <div class="card">
      <div class="sec-title">6-Month Spending</div>
      <div class="bar-chart">
        ${barData.map(b=>{
          const h = Math.round((b.total/maxBar)*90);
          return `<div class="bar-col">
            <div style="font-size:9px;color:var(--muted);margin-bottom:2px;">${b.total>0?fmt(b.total).replace('₹',''):'—'}</div>
            <div class="bar-fill" style="height:${h}px;background:linear-gradient(180deg,var(--accent),var(--blue));"></div>
            <div class="bar-month" style="color:var(--muted);">${b.label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <div class="sec-title">This Month by Category</div>
      ${CATS.map(cat=>{
        const amt = catTotals[cat.id]||0;
        if(!amt) return '';
        const pct = total>0?Math.round(amt/total*100):0;
        return `<div class="cat-row">
          <span style="font-size:20px;">${cat.label.split(' ')[0]}</span>
          <div class="cat-bar-wrap">
            <div class="cat-bar-header">
              <span>${cat.label.split(' ').slice(1).join(' ')}</span>
              <span>${fmt(amt)} <span style="color:var(--muted);font-size:10px;">${pct}%</span></span>
            </div>
            <div class="cat-bar-track">
              <div class="cat-bar-fill" style="width:${pct}%;background:${cat.color};"></div>
            </div>
          </div>
        </div>`;
      }).join('')||`<div class="empty-text">No data this month.</div>`}
    </div>

    <div class="card">
      <div class="sec-title">Budget Overview</div>
      ${CATS.map(cat=>{
        const budget = budgets[cat.id]||0;
        if(!budget) return '';
        const spent = catTotals[cat.id]||0;
        const pct = Math.min(Math.round(spent/budget*100),100);
        const over = spent>budget;
        return `<div class="budget-row">
          <span style="font-size:22px;">${cat.label.split(' ')[0]}</span>
          <div class="budget-info">
            <div class="budget-header">
              <span>${cat.label.split(' ').slice(1).join(' ')}</span>
              <span style="color:${over?'var(--red)':'var(--green)'};">${fmt(spent)}/${fmt(budget)}</span>
            </div>
            <div class="budget-track">
              <div class="budget-fill" style="width:${pct}%;background:${over?'var(--red)':'var(--accent)'};"></div>
            </div>
            ${over?`<div class="over-text">⚠️ Over by ${fmt(spent-budget)}</div>`:''}
          </div>
          <button class="edit-btn" onclick="openBudgetModal('${cat.id}')">Edit</button>
        </div>`;
      }).join('')||''}
      <button class="primary-btn" style="margin-top:8px;" onclick="openBudgetModal('')">⚙️ Set Budgets</button>
    </div>
  `;
}

// ── Budget Modal ──────────────────────────────────────
function openBudgetModal(catId) {
  editBudgetCat = catId || 'food';
  const cat = catById(editBudgetCat);
  document.getElementById('modal-title').textContent = `Budget: ${cat.label}`;
  document.getElementById('modal-input').value = budgets[editBudgetCat]||'';
  document.getElementById('budget-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('budget-modal').classList.add('hidden'); }
function saveBudget() {
  const v = parseFloat(document.getElementById('modal-input').value);
  if (!v || v<=0) { showToast('Enter valid budget!','error'); return; }
  budgets[editBudgetCat] = v;
  save('ss_bud', budgets);
  closeModal();
  showToast('Budget saved! ✅');
  renderAnalytics();
}

// ── EduPay ────────────────────────────────────────────
function renderEduPay() {
  const unpaidCount = eduEntries.filter(e=>!e.paid).length;
  const totalFees = eduEntries.reduce((s,e)=>s+e.fee,0);
  const paidFees  = eduEntries.filter(e=>e.paid).reduce((s,e)=>s+e.fee,0);

  document.getElementById('view-edupay').innerHTML = `
    <div class="edu-hero">
      <div style="font-size:13px;color:#10B981;font-weight:700;margin-bottom:6px;">🎓 EduPay Tracker</div>
      <div style="font-size:22px;font-weight:900;">${fmt(paidFees)} <span style="font-size:13px;color:var(--muted);font-weight:400;">of ${fmt(totalFees)} paid</span></div>
      <div style="font-size:12px;color:var(--muted);margin-top:6px;">${unpaidCount} payment${unpaidCount!==1?'s':''} pending</div>
    </div>

    <button class="edu-add-btn" onclick="openEduModal()">➕ Add Fee Entry</button>

    ${eduEntries.length ? eduEntries.map(e=>`
      <div class="edu-tuition-card ${e.paid?'paid':'unpaid'}">
        <div class="edu-top">
          <div class="edu-icon">🎓</div>
          <div class="edu-info">
            <div class="edu-name">${e.name}</div>
            <div class="edu-fee">${fmt(e.fee)}/month</div>
          </div>
          <button class="edu-status-btn ${e.paid?'paid':'unpaid'}" onclick="toggleEduPaid(${e.id})">
            ${e.paid?'✅ Paid':'❌ Unpaid'}
          </button>
        </div>
        <div class="edu-due">
          <span>📅 Due: ${e.due ? new Date(e.due).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : 'Not set'}</span>
          <button class="edu-del-btn" onclick="deleteEdu(${e.id})">🗑️</button>
        </div>
      </div>`).join('')
    : `<div class="empty-text">No fee entries yet.<br>Tap the button above to add one!</div>`}
  `;
}

function updateEduBadge() {
  const unpaid = eduEntries.filter(e=>!e.paid).length;
  const navBtn = document.getElementById('nav-edupay');
  let badge = navBtn.querySelector('.nav-badge');
  if (unpaid > 0) {
    if (!badge) { badge = document.createElement('span'); badge.className='nav-badge'; navBtn.appendChild(badge); }
    badge.textContent = unpaid;
  } else {
    if (badge) badge.remove();
  }
}

function openEduModal() {
  document.getElementById('edu-due-input').value = new Date().toISOString().split('T')[0];
  document.getElementById('edu-modal').classList.remove('hidden');
}
function closeEduModal() { document.getElementById('edu-modal').classList.add('hidden'); }
function saveEduEntry() {
  const name = document.getElementById('edu-name-input').value.trim();
  const fee  = parseFloat(document.getElementById('edu-fee-input').value);
  const due  = document.getElementById('edu-due-input').value;
  if (!name) { showToast('Enter a name!','error'); return; }
  if (!fee||fee<=0) { showToast('Enter valid fee!','error'); return; }
  eduEntries.push({ id: Date.now(), name, fee, due, paid: false });
  save('ss_edu', eduEntries);
  closeEduModal();
  updateEduBadge();
  showToast('Fee entry added! 🎓');
  renderEduPay();
  document.getElementById('edu-name-input').value = '';
  document.getElementById('edu-fee-input').value = '';
}
function toggleEduPaid(id) {
  const e = eduEntries.find(e=>e.id===id);
  if (e) { e.paid = !e.paid; save('ss_edu',eduEntries); updateEduBadge(); renderEduPay(); }
}
function deleteEdu(id) {
  eduEntries = eduEntries.filter(e=>e.id!==id);
  save('ss_edu',eduEntries);
  updateEduBadge();
  showToast('Deleted!','error');
  renderEduPay();
}

function editName() {
  const n = prompt('Enter new name:', userName);
  if (n && n.trim()) { userName = n.trim(); save('ss_name',userName); renderProfile(); showToast('Name updated! ✅'); }
}

function clearAllData() {
  if (confirm('Delete ALL data? This cannot be undone!')) {
    expenses=[]; budgets={}; eduEntries=[];
    save('ss_exp',[]); save('ss_bud',{}); save('ss_edu',[]);
    showToast('All data cleared!','error');
    renderProfile();
    updateEduBadge();
  }
}
</script>
